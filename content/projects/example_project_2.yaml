title: "Concrete Cracks Classification Project"

short_summary: >
  This data used for this project is a set of images of cracked and 
  non-cracked concrete from walls, sidewalks, and bridges. The project 
  builds a classification algorithm to classify images into cracked or 
  non-cracked.



tech_stack:
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scipy
  - pillow
  - scikit-learn

problem_statement: >
  This project uses the Concrete Cracks dataset. The goal is to 
  classify images into cracked or non-cracked concrete to be able to 
  quickly identify locations with concrete cracks.

approach: >
  To address our research questions, we began by preprocessing the data. 
  This involved combining the images from the two datasets into a single 
  unified dataset. We then converted the categorical labels into numerical 
  values and flattened the image data to prepare it for model input. 
  After preprocessing, we analyzed the shape and structure of the dataset 
  to determine which classification models would be most appropriate. We 
  proceeded to build and evaluate several models, ultimately focusing on 
  logistic regression and a random forest classifier to compare 
  performance and identify the most effective approach for our specific 
  dataset.



results_impact: >
  In this project, we explored the effectiveness of various classification 
  models in identifying cracks in images. Through preprocessing, model 
  experimentation, and hyperparameter tuning, we observed that class 
  imbalance significantly impacted our model performance, particularly in 
  overpredicting the majority class. By implementing balancing techniques 
  and using tools like GridSearchCV, we were able to develop more reliable 
  models that better captured patterns across both cracked and non-cracked 
  images. In the end the model that performed the best was the Random Forest 
  Classifier due to its higher performance across all metrics.



